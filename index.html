<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Watch PH Mapping System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>🌦 Weather Watch PH</h2>

<label>Advisory</label>
<select id="advisory">
    <option value="class">Class Suspension</option>
    <option value="rain">Rainfall Warning</option>
    <option value="flood">Flood Advisory</option>
    <option value="tc">Tropical Cyclone</option>
    <option value="storm">Storm Surge</option>
    <option value="heat">Heat Index</option>
    <option value="earthquake">Earthquake</option>
    <option value="volcano">Volcanic Alert</option>
</select>

<label for="region">Region</label>
<select id="region">
    <option value="">🌏 Select Region</option>
</select>

<label for="province">Province</label>
<select id="province" disabled>
    <option value="">🏛 Select Province</option>
</select>

<label for="municipality">Municipality / City</label>
<select id="municipality" disabled>
    <option value="">🏙 Select Municipality / City</option>
</select>

<label>Status</label>
<select id="status">
    <option value="red">🔴 All Levels</option>
    <option value="orange">🟠 Senior High</option>
    <option value="yellow">🟡 Elementary</option>
    <option value="white">⚪ No Advisory</option>
</select>

<label>Color</label>
<input type="color" id="colorPicker" value="#ff0000">

<button id="applyBtn">Apply</button>
<button id="resetBtn">Reset Colors</button>
<button id="downloadBtn">Generate PNG</button>

<hr>

<div id="selectedInfo">
<b>Selected:</b><br>
<span id="selectedMunicipality">None</span>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
